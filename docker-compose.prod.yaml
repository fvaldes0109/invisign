services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MARIADB_DATABASE=${DB_DATABASE}
      - MARIADB_USER=${DB_USERNAME}
      - MARIADB_PASSWORD=${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./marking-module
    env_file: ./marking-module/.env.prod
    restart: unless-stopped
    command: uvicorn server:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      start_period: 15s
      interval: 30s
      timeout: 5s
      retries: 3

  laravel:
    build: ./laravel-backend
    env_file: ./laravel-backend/.env.prod
    restart: unless-stopped
    command: >
      sh -c "php artisan storage:link --force &&
             php artisan migrate --force &&
             php artisan config:cache &&
             php artisan route:cache &&
             php artisan serve --host=0.0.0.0 --port=8080"
    volumes:
      - laravel_storage:/app/storage/app/public
    healthcheck:
      test: ["CMD-SHELL", "php -r \"exit(file_get_contents('http://localhost:8080/up') !== false ? 0 : 1);\""]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./react-front
      dockerfile: Dockerfile.prod
      args:
        VITE_APP_URL: ${VITE_APP_URL}
        VITE_BACKEND_HOST: ${VITE_BACKEND_HOST}
        VITE_BACKEND_PORT: ${VITE_BACKEND_PORT}
        VITE_WATERMARK_SERVICE_HOST: ${VITE_WATERMARK_SERVICE_HOST}
        VITE_WATERMARK_SERVICE_PORT: ${VITE_WATERMARK_SERVICE_PORT}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ > /dev/null"]
      start_period: 5s
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    build:
      context: ./docker/nginx
      args:
        DOMAIN: ${DOMAIN}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - frontend
      - laravel
      - backend

volumes:
  db_data:
  laravel_storage:
