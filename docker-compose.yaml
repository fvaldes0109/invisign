services:
  backend:
    build: ./marking-module
    env_file: ./marking-module/.env
    ports:
      - "${WATERMARK_SERVICE_PORT:-8000}:${WATERMARK_SERVICE_PORT:-8000}"
    volumes:
      - ./marking-module:/app

  laravel:
    build: ./laravel-backend
    env_file: ./laravel-backend/.env
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      - db
    volumes:
      - ./laravel-backend:/app
      - laravel_vendor:/app/vendor

  db:
    image: mariadb:11
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MARIADB_DATABASE=${DB_DATABASE}
      - MARIADB_USER=${DB_USERNAME}
      - MARIADB_PASSWORD=${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

  frontend:
    build: ./react-front
    env_file: ./react-front/.env
    environment:
      - VITE_WATERMARK_SERVICE_HOST=http://localhost
      - VITE_WATERMARK_SERVICE_PORT=${WATERMARK_SERVICE_PORT:-8000}
      - VITE_BACKEND_HOST=http://localhost
      - VITE_BACKEND_PORT=${BACKEND_PORT:-8080}
    ports:
      - "${VITE_DEV_PORT:-5173}:${VITE_DEV_PORT:-5173}"
    depends_on:
      - backend
      - laravel
    volumes:
      - ./react-front:/app
      - frontend_node_modules:/app/node_modules

volumes:
  db_data:
  laravel_vendor:
  frontend_node_modules:
